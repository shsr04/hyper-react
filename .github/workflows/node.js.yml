name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Setup
      uses: actions/setup-node@v6
      with:
        cache: 'yarn'
    - run: yarn run lint
    - run: yarn run build
    - run: yarn run test
